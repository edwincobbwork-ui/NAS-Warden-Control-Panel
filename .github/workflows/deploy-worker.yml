name: Deploy NAS Warden Control Plane

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required repository secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CONTROL_PLANE_AGENT_TOKEN: ${{ secrets.CONTROL_PLANE_AGENT_TOKEN }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_D1_DATABASE_ID
            CONTROL_PLANE_AGENT_TOKEN
            ADMIN_API_TOKEN
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for control-plane deployment."
              exit 1
            fi
          done

      - name: Install Wrangler
        working-directory: worker
        run: npm install --no-save wrangler@latest

      - name: Create wrangler.toml from template
        working-directory: worker
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          cp wrangler.example.toml wrangler.toml
          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path("wrangler.toml")
          text = path.read_text()
          db_id = os.environ["CLOUDFLARE_D1_DATABASE_ID"]
          text = text.replace("REPLACE_WITH_REAL_D1_DATABASE_ID", db_id)
          path.write_text(text)
          PY

      - name: Apply D1 schema remotely
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute nas-warden-control-plane --remote --file=../schema-v1.sql

      - name: Upsert Worker runtime secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTROL_PLANE_AGENT_TOKEN: ${{ secrets.CONTROL_PLANE_AGENT_TOKEN }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          printf '%s' "$CONTROL_PLANE_AGENT_TOKEN" | npx wrangler secret put CONTROL_PLANE_AGENT_TOKEN
          printf '%s' "$ADMIN_API_TOKEN" | npx wrangler secret put ADMIN_API_TOKEN

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
